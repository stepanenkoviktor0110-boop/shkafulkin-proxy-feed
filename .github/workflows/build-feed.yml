name: Build feed

# Каноничный workflow для proxy-feed, используется для всех новых клиентов B24U.
# Pages-конфиг в репо должен быть `build_type: workflow` — устанавливается через
# `gh api -X PUT repos/<owner>/<repo>/pages -f build_type=workflow`. Без этого
# legacy-сборщик ругается на автокоммиты от github-actions[bot] и шлёт письма
# «Page build failed» владельцу (хотя фактическая раздача файла продолжает
# работать). См. case-study Kstore 2026-05-14 и SKILL.md → Шаг 4.

on:
  schedule:
    - cron: '0 */6 * * *'   # каждые 6 часов (00, 06, 12, 18 UTC)
  workflow_dispatch:
  push:
    branches: [main]
    paths: [build-feed.mjs, package.json, package-lock.json, .github/workflows/build-feed.yml]

permissions:
  contents: write   # push коммита feed.xml
  pages: write      # деплой на Pages через actions/deploy-pages
  id-token: write   # OIDC для actions/deploy-pages

# Параллельные cron-runs не накладываются; второй ждёт первый.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm install

      - name: Build feed
        env:
          # Если URL фида публичный — можно хардкодить SOURCE_FEED_URL в build-feed.mjs
          # и удалить эту строку. Если фид клиента требует токена / закрыт — положить
          # URL (а при необходимости и токен) в Settings → Secrets and variables → Actions.
          SOURCE_FEED_URL: ${{ secrets.SOURCE_FEED_URL }}
        run: |
          npm run build
          cp public/feed.xml feed.xml

      - id: commit
        name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet feed.xml; then
            echo "No changes in feed.xml — skip commit and deploy."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git add feed.xml
            git commit -m "chore: auto-update feed.xml ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            # Pull --rebase --autostash спасает от race-condition с параллельным push
            # (когда автотрид и ручной push сходятся в одном окне).
            git pull --rebase --autostash origin main
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Stage Pages artifact
        if: steps.commit.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          mkdir -p _site
          cp feed.xml _site/feed.xml
          cp .nojekyll _site/.nojekyll
          cp README.md _site/README.md || true

      - name: Upload Pages artifact
        if: steps.commit.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    if: needs.build.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
